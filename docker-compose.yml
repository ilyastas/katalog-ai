version: '3.9'

services:
  # Neo4j Graph Database for Business Intelligence
  neo4j:
    image: neo4j:5-enterprise
    container_name: alie-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "7687:7687"  # Bolt protocol
      - "7474:7474"  # Browser
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    networks:
      - alie-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Lead Events & Analytics
  postgres:
    image: postgres:15-alpine
    container_name: alie-postgres
    environment:
      - POSTGRES_USER=alie_user
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=alie_db
      - TZ=UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alie_user -d alie_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Caching & Session Storage
  redis:
    image: redis:7-alpine
    container_name: alie-redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alie-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: alie-api
    environment:
      - ENVIRONMENT=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - DATABASE_URL=postgresql://alie_user:postgres123@postgres:5432/alie_db
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TWOGIS_API_KEY=${TWOGIS_API_KEY}
      - APIFY_TOKEN=${APIFY_TOKEN}
      - GOOGLE_PLACES_KEY=${GOOGLE_PLACES_KEY}
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    networks:
      - alie-network
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Celery Worker for Background Tasks
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: alie-celery-worker
    environment:
      - ENVIRONMENT=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - DATABASE_URL=postgresql://alie_user:postgres123@postgres:5432/alie_db
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TWOGIS_API_KEY=${TWOGIS_API_KEY}
      - APIFY_TOKEN=${APIFY_TOKEN}
      - GOOGLE_PLACES_KEY=${GOOGLE_PLACES_KEY}
    depends_on:
      - api
      - redis
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    networks:
      - alie-network
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # Celery Beat for Scheduled Tasks (Daily Verification)
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: alie-celery-beat
    environment:
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - celery-worker
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    networks:
      - alie-network
    command: celery -A backend.workers.celery_app beat --loglevel=info
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:

networks:
  alie-network:
    driver: bridge
