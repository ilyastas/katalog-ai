<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.2;
            margin-bottom: 40px;
            color: #ffffff;
        }

        .divider {
            height: 1px;
            background: #333;
            margin: 40px 0;
        }

        p {
            font-size: 0.95rem;
            color: #999;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Каталог AI</h1>
        <div class="divider"></div>
        <p>Открытый каталог для ИИ-ботов | <a href="data.json" style="color: #666; text-decoration: none;">data.json</a></p>
    </div>
</body>
</html>
