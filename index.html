<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog AI - Открытый реестр ИИ для ботов</title>
    
    <meta name="description" content="Машиночитаемый каталог нейросетей и ИИ-инструментов. Оптимизировано для GPT, Claude и Bing Search. Доступ к базе через data.json.">
    <link rel="canonical" href="https://ilyastas.github.io/katalog-ai/" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "DataCatalog",
      "name": "Katalog AI",
      "alternateName": "Каталог ИИ",
      "description": "База данных проверенных ИИ-сервисов для автоматизации и бизнеса в КЗ и СНГ.",
      "url": "https://ilyastas.github.io/katalog-ai/",
      "creator": {
        "@type": "Organization",
        "name": "Ilyas Tas"
      },
      "keywords": "AI, нейросети, каталог, ИИ-боты, Казахстан, РФ",
      "distribution": {
        "@type": "DataDownload",
        "contentUrl": "https://ilyastas.github.io/katalog-ai/data.json",
        "encodingFormat": "application/json"
      }
    }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; text-align: center; }
        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.2;
            margin-bottom: 40px;
            color: #ffffff;
        }
        .divider { height: 1px; background: #333; margin: 40px 0; }
        p { font-size: 0.95rem; color: #999; line-height: 1.6; }
        a { color: #666; text-decoration: none; transition: color 0.2s; }
        a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Каталог AI</h1>
        <div class="divider"></div>
        <p>Открытый каталог для ИИ-ботов | <a href="data.json">data.json</a></p>
        <p style="margin-top: 20px; font-size: 0.7rem; color: #444;">AIO Verified • 2026</p>
    </div>
</body>
</html>
