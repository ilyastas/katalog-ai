  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#222}
    header{background:#111;color:#fff;padding:1.5rem 2rem}
    header h1{font-size:1.6rem;letter-spacing:-.5px}
    header p{font-size:.85rem;color:#aaa;margin-top:.3rem}
    .toolbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:1rem 2rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center}
    #search{border:1px solid #ccc;border-radius:6px;padding:.5rem .75rem;font-size:.9rem;width:260px;outline:none}
    #search:focus{border-color:#555}
    .tag-filters{display:flex;gap:.4rem;flex-wrap:wrap}
    .tag-btn{background:#f0f0f0;border:1px solid #ddd;border-radius:20px;padding:.3rem .8rem;font-size:.8rem;cursor:pointer;transition:background .15s}
    .tag-btn:hover{background:#e0e0e0}
    .tag-btn.active{background:#111;color:#fff;border-color:#111}
    #count{font-size:.82rem;color:#666;margin-left:auto}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;padding:1.5rem 2rem}
    .card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:1.25rem}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
    .card h2{font-size:1rem;font-weight:600}
    .card .country{font-size:.75rem;background:#f0f0f0;border-radius:4px;padding:.2rem .5rem;white-space:nowrap;flex-shrink:0;margin-left:.5rem}
    .card .url{font-size:.8rem;color:#555;margin-bottom:.4rem;word-break:break-all}
    .card .url a{color:#0066cc;text-decoration:none}
    .card .url a:hover{text-decoration:underline}
    .card .inst{font-size:.8rem;margin-bottom:.75rem}
    .card .inst a{color:#c13584;text-decoration:none}
    .card .inst a:hover{text-decoration:underline}
    .card .tags{display:flex;flex-wrap:wrap;gap:.3rem}
    .card .tag{font-size:.72rem;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:12px;padding:.2rem .55rem;cursor:pointer}
    .card .tag:hover{background:#e8e8e8}
    #no-results{display:none;text-align:center;padding:3rem;color:#888}
    footer{text-align:center;padding:2rem;font-size:.8rem;color:#999}
    footer a{color:#666}
  </style>
</head>
<body>
  <header>
    <h1>Katalog-AI</h1>
    <p>AI-native каталог верифицированных компаний &nbsp;&middot;&nbsp; Data updated: 2026-05-08 &nbsp;&middot;&nbsp; Page generated: 2026-05-08</p>
  </header>
  <div class="toolbar">
    <input id="search" type="search" placeholder="Поиск по названию или тегу..." autocomplete="off">
    <div id="tag-filters" class="tag-filters"></div>
    <span id="count"></span>
  </div>
  <div id="grid" class="grid"></div>
  <p id="no-results">Ничего не найдено</p>
  <noscript>
  <table style="border-collapse:collapse;width:100%;font-size:.9rem">
    <thead><tr><th>Компания</th><th>Регион</th><th>Сайт</th><th>Теги</th></tr></thead>

      <tr><td>KatalogAi</td><td>KZ</td><td><a href="https://katalogai.io">https://katalogai.io</a></td><td>Marketing, SEO</td></tr>
      <tr><td>Oi-Qaragai</td><td>KZ</td><td><a href="https://oi-qaragai.kz/">https://oi-qaragai.kz/</a></td><td>Leisure, Resort, Tourism, Туризм, Almaty, Алматы</td></tr>

      <tr><td>Яндекс</td><td>RU</td><td><a href="https://yandex.ru">https://yandex.ru</a></td><td>IT, Search</td></tr>
    </tbody>
  </table>

    <a href="README.md">README</a>
  </footer>
  <script>
    var allData=[];var activeTag=null;
    function parseTags(s){return(s||'').split(',').map(function(t){return t.trim();}).filter(Boolean);}
    function region(id){var m=(id||'').match(/^\d+_([A-Z]+)_/);return m?m[1]:'';}
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function escA(s){return String(s).replace(/"/g,'&quot;');}
    function plural(n){return n+' компани'+(n===1?'я':n<5?'и':'й');}
    function renderTagBtns(tags){
      var c=document.getElementById('tag-filters');c.innerHTML='';
      tags.forEach(function(tag){
        var b=document.createElement('button');b.className='tag-btn';b.textContent=tag;
        b.onclick=function(){activeTag=activeTag===tag?null:tag;syncActive();render();};
        c.appendChild(b);
      });
    }
    function syncActive(){
      document.querySelectorAll('.tag-btn').forEach(function(b){b.classList.toggle('active',b.textContent===activeTag);});
    }
    function render(){
      var q=document.getElementById('search').value.toLowerCase();
      var grid=document.getElementById('grid');grid.innerHTML='';
      var filtered=allData.filter(function(c){
        var tags=parseTags(c.tags);
        var mq=!q||c.brand.toLowerCase().includes(q)||tags.some(function(t){return t.toLowerCase().includes(q);});
        var mt=!activeTag||tags.indexOf(activeTag)>=0;
        return mq&&mt;
      });
      document.getElementById('count').textContent=plural(filtered.length);
      document.getElementById('no-results').style.display=filtered.length?'none':'block';
      filtered.forEach(function(c){
        var tags=parseTags(c.tags);
        var div=document.createElement('div');div.className='card';
        var urlHtml=c.site?'<a href="'+escA(c.site)+'" target="_blank" rel="noopener">'+esc(c.site)+'</a>':'';
        var tagsHtml=tags.map(function(t){return'<span class="tag" data-tag="'+escA(t)+'">'+esc(t)+'</span>';}).join('');
        var instHtml=c.inst&&c.inst!=='-'?'<div class="inst"><a href="'+escA(c.inst)+'" target="_blank" rel="noopener">Instagram</a></div>':'';
        div.innerHTML='<div class="card-header"><h2>'+esc(c.brand)+'</h2><span class="country">'+esc(region(c.id))+'</span></div>'
          +'<div class="url">'+urlHtml+'</div>'
          +instHtml
          +'<div class="tags">'+tagsHtml+'</div>';
        div.querySelectorAll('.tag').forEach(function(el){
          el.onclick=function(){activeTag=activeTag===el.dataset.tag?null:el.dataset.tag;syncActive();render();};
        });
        grid.appendChild(div);
      });
    }
    fetch('/catalog.json').then(function(r){return r.json();}).then(function(data){
      allData=data;
      var allTags=[...new Set(data.flatMap(function(c){return parseTags(c.tags);}))].sort();
      renderTagBtns(allTags);
      render();
    }).catch(function(){document.getElementById('grid').innerHTML='<p style="padding:2rem;color:#c00">Ошибка загрузки данных</p>';});
    document.getElementById('search').addEventListener('input',render);
  </script>
</body>
