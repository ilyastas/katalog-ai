name: Daily Sync

on:
  schedule:
    - cron: "7 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run sync
        run: python scripts/sync_all.py

      - name: Validate
        run: python scripts/validate_sync.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MASTER_KZ.md MASTER_RU.md README.md llms.txt sitemap.xml robots.txt index.html catalog.json AI_METHOD.md AI_SCHEMA.md AI_FAQ.md company/*.html 7f559c9f7d60484fa802ab03c9328995.txt 9a1f3247e0e9496aa35d6b290e5862bb.txt .well-known/ai-plugin.json .well-known/openapi.json
          git commit -m "[AUTO] Daily sync refresh"
          git push

      - name: Ping IndexNow (Bing)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('.')
          data = json.loads((root / 'catalog.json').read_text(encoding='utf-8'))
          urls = [
              "https://katalogai.io/",
              "https://katalogai.io/catalog.json",
              "https://katalogai.io/llms.txt",
              "https://katalogai.io/sitemap.xml",
              "https://katalogai.io/README.md",
          ]
          urls.extend(f"https://katalogai.io/company/{row['id']}.html" for row in data)
          payload = {
              "host": "katalogai.io",
              "key": "7f559c9f7d60484fa802ab03c9328995",
              "keyLocation": "https://katalogai.io/7f559c9f7d60484fa802ab03c9328995.txt",
              "urlList": urls,
          }
          (root / 'indexnow_payload.json').write_text(json.dumps(payload, ensure_ascii=False), encoding='utf-8')
          PY

          curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data-binary @indexnow_payload.json || true
          echo "IndexNow ping complete"
