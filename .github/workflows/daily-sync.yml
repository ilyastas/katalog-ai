name: Daily Sync

on:
  schedule:
    - cron: "7 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run sync
        run: python sync_all.py

      - name: Validate
        run: python validate_sync.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md llms.txt sitemap.xml robots.txt index.html catalog.json
          git commit -m "[AUTO] Daily sync refresh"
          git push
