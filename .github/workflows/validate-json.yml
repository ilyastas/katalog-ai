name: JSON Validator

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Validate All JSON Files
        shell: bash
        run: |
          for file in *.json; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              python -m json.tool "$file" > /dev/null || { echo "ERROR in $file"; exit 1; }
            fi
          done
