name: validate-json

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON files in root
        shell: bash
        run: |
          find . -maxdepth 1 -name "*.json" | while read -r file; do
            echo "Checking $file..."
            python -m json.tool "$file" > /dev/null
          done
