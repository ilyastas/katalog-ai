name: CDN Data Synchronization

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write

jobs:
    sync-and-validate:
        # Avoid self-trigger loops on bot commits.
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install Dependencies
              run: |
                  if [ -f requirements.txt ]; then
                    pip install -r requirements.txt
                  fi

            - name: Run Sync Pipeline
              run: python scripts/sync_all.py

            - name: Run Validation Checks
              run: python scripts/validate_sync.py

            - name: Commit and Push Updated Artifacts
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add -A
                  if ! git diff --staged --quiet; then
                    git commit -m "chore(auto-sync): update verified business datasets and trust signals [skip ci]"
                    git pull --rebase origin main
                    git push origin HEAD:main
                  else
                    echo "No changes detected in verified datasets."
                  fi
