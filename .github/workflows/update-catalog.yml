name: Update Catalog - 2GIS, OLX, Google Verification
# Р В РЎвҖҷР В Р вҖ Р РҺРІРӮСҷР В РЎвҖўР В РЎВҳР В Р’В°Р РҺРІРӮСҷР В РЎвҖҳР РҺРІРӮРҺР В Р’ВөР РҺР С“Р В РЎвҖқР В РЎвҖўР В Р’Вө Р В РЎвҖўР В Р’ВұР В Р вҖҰР В РЎвҖўР В Р вҖ Р В Р’В»Р В Р’ВөР В Р вҖҰР В РЎвҖҳР В Р’Вө Р В РЎвҖқР В Р’В°Р РҺРІРӮСҷР В Р’В°Р В Р’В»Р В РЎвҖўР В РЎвҖ“Р В Р’В° Р В РЎвҖҳ Р В Р вҖ Р В Р’ВөР РҺР вҖҡР В РЎвҖҳР РҺРІРӮСӣР В РЎвҖҳР В РЎвҖқР В Р’В°Р РҺРІРӮВ Р В РЎвҖҳР РҺР РҸ Р В РўвҖҳР В Р’В°Р В Р вҖҰР В Р вҖҰР РҺРІРӮв„–Р РҺРІРӮВҰ Р РҺРІРӮРҺР В Р’ВөР РҺР вҖҡР В Р’ВөР В Р’В· 2Р В РІРӮСҡР В Р’ВҳР В Р РӢ, OLX Р В РЎвҖҳ Google Places

on:
  schedule:
    # Р В РІРӮвҖқР В Р’В°Р В РЎвҖ”Р РҺРЎвҖңР РҺР С“Р В РЎвҖқ Р В РЎвҖқР В Р’В°Р В Р’В¶Р В РўвҖҳР РҺРІРӮв„–Р В РІвҖһвҖ“ Р В РўвҖҳР В Р’ВөР В Р вҖҰР РҺР Рү Р В Р вҖ  00:00 UTC (04:00 UTC+4 Р В РЎв„ўР В Р’В°Р В Р’В·Р В Р’В°Р РҺРІРӮВҰР РҺР С“Р РҺРІРӮСҷР В Р’В°Р В Р вҖҰ)
    - cron: '0 0 * * *'
  
  workflow_dispatch:  # Р В Р’В Р РҺРЎвҖңР РҺРІРӮРҺР В Р вҖҰР В РЎвҖўР В РІвҖһвҖ“ Р В Р’В·Р В Р’В°Р В РЎвҖ”Р РҺРЎвҖңР РҺР С“Р В РЎвҖқ Р В РЎвҖҳР В Р’В· GitHub Actions Р В Р вҖ Р В РЎвҖқР В Р’В»Р В Р’В°Р В РўвҖҳР В РЎвҖқР В РЎвҖҳ
  
  push:
    branches: [ main ]
    paths:
      - 'catalog/**'
      - 'verifiers/**'

jobs:
  verify-and-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: РЎРӮРЎСҹРІРӮСҡРўС’ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: РЎРӮРЎСҹРЎвҖҷР РҠ Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: РЎРӮРЎСҹРІРӮСҡР’ВҰ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: РЎРӮРЎСҹРІРӮСңР РҠ Run 2GIS verifier
        run: python verifiers/2gis_verifier.py
        env:
          TWOGIS_API_KEY: ${{ secrets.TWOGIS_API_KEY }}
        continue-on-error: true

      - name: РЎРӮРЎСҹРІРӮСңР РҠ Run OLX verifier
        run: python verifiers/olx_verifier.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        continue-on-error: true

      - name: РЎРӮРЎСҹРІРӮСңР РҠ Run Google Places verifier
        run: python verifiers/google_verifier.py
        env:
          GOOGLE_PLACES_KEY: ${{ secrets.GOOGLE_PLACES_KEY }}
        continue-on-error: true

      - name: РЎРӮРЎСҹРІРӮСҡР вҖ° Generate verification report
        run: |
          echo "## Katalog-AI Verification Report" > verification_report.md
          echo "Generated: $(date -u)" >> verification_report.md
          echo "" >> verification_report.md
          
          if [ -f verification_results_2gis.json ]; then
            echo "### 2GIS Verification" >> verification_report.md
            cat verification_results_2gis.json >> verification_report.md
            echo "" >> verification_report.md
          fi
          
          if [ -f verification_results_olx.json ]; then
            echo "### OLX Verification" >> verification_report.md
            cat verification_results_olx.json >> verification_report.md
            echo "" >> verification_report.md
          fi
          
          if [ -f verification_results_google.json ]; then
            echo "### Google Places Verification" >> verification_report.md
            cat verification_results_google.json >> verification_report.md
          fi

      - name: РЎРӮРЎСҹРІРӮСңРІРӮСӣ Update dateModified in catalog files
        run: |
          python -c "
          import json
          from datetime import datetime
          
          files = ['index.json', 'catalog/nrdj-salon.json', 'catalog/secret-skin.json', 'catalog/mltrade.json']
          
          for file in files:
              try:
                  with open(file, 'r', encoding='utf-8') as f:
                      data = json.load(f)
                  data['dateModified'] = datetime.utcnow().strftime('%Y-%m-%d')
                  with open(file, 'w', encoding='utf-8') as f:
                      json.dump(data, f, ensure_ascii=False, indent=2)
                  print(f'Р РҶРЎСҷРІРӮВҰ Updated {file}')
              except Exception as e:
                  print(f'Р РҶРЎв„ўР’В Р С—РЎвҖҳР РҸ Could not update {file}: {e}')
          "

      - name: РЎРӮРЎСҹРІРӮСңРЎвҖҷ Configure Git
        run: |
          git config --local user.name 'GitHub Action Bot'
          git config --local user.email 'action@github.com'

      - name: РЎРӮРЎСҹРІРӮСҡРЎСҡ Commit verification results
        run: |
          git add -A
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "РЎРӮРЎСҹР’ВӨРІРӮвҖң Auto-update catalog and verification results $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && echo "COMMIT_CREATED=true" >> $GITHUB_ENV
          )
        continue-on-error: true

      - name: РЎРӮРЎСҹРЎв„ўР вҖҡ Push changes
        if: env.COMMIT_CREATED == 'true'
        run: git push
        continue-on-error: true

      - name: РЎРӮРЎСҹРІРӮСҡР’В§ Create pull request if verification failed
        if: failure()
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'Р РҶРЎв„ўР’В Р С—РЎвҖҳР РҸ Verification issues detected - manual review required'
          title: 'Р РҶРЎв„ўР’В Р С—РЎвҖҳР РҸ Catalog Verification Issues'
          body: |
            # Verification Issues Detected
            
            Some businesses failed verification. Please review:
            - Check if API keys are configured in GitHub Secrets
            - Verify business data in catalog files
            - Update addresses or contact information if needed
            
            See logs above for details.
          branch: 'verification-issues'
        continue-on-error: true

      - name: Р РҶРЎСҷРІРӮВҰ Workflow completed
        run: |
          echo "Р РҶРЎСҷРІРӮВҰ Catalog verification and update completed!"
          echo "РЎРӮРЎСҹРІРӮСҡР вҖ° Check 'verification_report.md' for details"
