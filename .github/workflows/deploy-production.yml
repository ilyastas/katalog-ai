name: Deploy to Production

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  KUBE_NAMESPACE: alie-prod

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://api.alie.kz
    
    permissions:
      contents: read
      packages: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: Verify cluster connection
      run: |
        kubectl cluster-info
        kubectl get nodes
    
    - name: Create namespace if not exists
      run: |
        kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Create/Update ConfigMap
      run: |
        kubectl apply -f k8s/configmap.yaml -n ${{ env.KUBE_NAMESPACE }}
    
    - name: Create/Update Secrets
      run: |
        kubectl create secret generic alie-secrets \
          --namespace=${{ env.KUBE_NAMESPACE }} \
          --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
          --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
          --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
          --from-literal=CELERY_BROKER_URL="${{ secrets.CELERY_BROKER_URL }}" \
          --from-literal=CELERY_RESULT_BACKEND="${{ secrets.CELERY_RESULT_BACKEND }}" \
          --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
          --from-literal=OPENAI_ASSISTANT_ID="${{ secrets.OPENAI_ASSISTANT_ID }}" \
          --from-literal=TWOGIS_API_KEY="${{ secrets.TWOGIS_API_KEY }}" \
          --from-literal=GOOGLE_PLACES_KEY="${{ secrets.GOOGLE_PLACES_KEY }}" \
          --from-literal=APIFY_TOKEN="${{ secrets.APIFY_TOKEN }}" \
          --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
          --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Deploy PostgreSQL
      run: |
        kubectl apply -f k8s/postgres-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
        kubectl rollout status deployment/postgres -n ${{ env.KUBE_NAMESPACE }} --timeout=5m
    
    - name: Deploy Redis
      run: |
        kubectl apply -f k8s/redis-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
        kubectl rollout status deployment/redis -n ${{ env.KUBE_NAMESPACE }} --timeout=5m
    
    - name: Update API image tag
      run: |
        kubectl set image deployment/alie-api \
          api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }} \
          -n ${{ env.KUBE_NAMESPACE }}
    
    - name: Deploy API
      run: |
        kubectl apply -f k8s/api-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
        kubectl rollout status deployment/alie-api -n ${{ env.KUBE_NAMESPACE }} --timeout=10m
    
    - name: Update Worker image tag
      run: |
        kubectl set image deployment/alie-worker \
          worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ github.sha }} \
          -n ${{ env.KUBE_NAMESPACE }}
    
    - name: Deploy Worker
      run: |
        kubectl apply -f k8s/worker-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
        kubectl rollout status deployment/alie-worker -n ${{ env.KUBE_NAMESPACE }} --timeout=10m
    
    - name: Update Beat image tag
      run: |
        kubectl set image deployment/alie-beat \
          beat=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-beat:${{ github.sha }} \
          -n ${{ env.KUBE_NAMESPACE }}
    
    - name: Deploy Beat
      run: |
        kubectl apply -f k8s/beat-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
        kubectl rollout status deployment/alie-beat -n ${{ env.KUBE_NAMESPACE }} --timeout=5m
    
    - name: Deploy Ingress
      run: |
        kubectl apply -f k8s/ingress.yaml -n ${{ env.KUBE_NAMESPACE }}
    
    - name: Verify deployment
      run: |
        echo "=== Deployment Status ==="
        kubectl get all -n ${{ env.KUBE_NAMESPACE }}
        
        echo -e "\n=== Pod Status ==="
        kubectl get pods -n ${{ env.KUBE_NAMESPACE }} -o wide
        
        echo -e "\n=== Service Status ==="
        kubectl get services -n ${{ env.KUBE_NAMESPACE }}
        
        echo -e "\n=== Ingress Status ==="
        kubectl get ingress -n ${{ env.KUBE_NAMESPACE }}
    
    - name: Run database migrations
      run: |
        kubectl exec -n ${{ env.KUBE_NAMESPACE }} \
          deployment/alie-api -- \
          alembic upgrade head
      continue-on-error: true
    
    - name: Smoke test
      run: |
        echo "Waiting for service to be ready..."
        sleep 30
        
        # Get the external IP
        EXTERNAL_IP=$(kubectl get ingress alie-ingress -n ${{ env.KUBE_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        if [ -z "$EXTERNAL_IP" ]; then
          echo "Warning: External IP not yet assigned"
        else
          echo "Testing endpoint: https://$EXTERNAL_IP/health"
          curl -f -k "https://$EXTERNAL_IP/health" || echo "Health check failed"
        fi
      continue-on-error: true
    
    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed!"
        fi

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    
    steps:
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
    
    - name: Rollback API
      run: |
        kubectl rollout undo deployment/alie-api -n ${{ env.KUBE_NAMESPACE }}
    
    - name: Rollback Worker
      run: |
        kubectl rollout undo deployment/alie-worker -n ${{ env.KUBE_NAMESPACE }}
    
    - name: Rollback Beat
      run: |
        kubectl rollout undo deployment/alie-beat -n ${{ env.KUBE_NAMESPACE }}
