name: Deploy Pages (Publish-Only)

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Generate site artifacts
              run: |
                  python scripts/sync_all.py
                  python scripts/validate_sync.py

            - name: Build publish-only bundle
              run: python scripts/build_public_site.py

            - name: Configure Pages
              uses: actions/configure-pages@v5

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: public-site

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
