name: Deploy Pages (Publish-Only)

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Generate site artifacts
              run: |
                  python scripts/sync_all.py
                  python scripts/validate_sync.py

            - name: Build publish-only bundle
              run: python scripts/build_public_site.py

            - name: Configure Pages
              uses: actions/configure-pages@v5

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: public-site

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4

            - name: Ping IndexNow (Bing) after deploy
              run: |
                  python - <<'PY'
                  import json
                  from pathlib import Path
                  root = Path('.')
                  data = json.loads((root / 'catalog.json').read_text(encoding='utf-8'))
                  urls = ["https://katalogai.io/"]
                  urls.extend(f"https://katalogai.io/company/{row['id']}.html" for row in data)
                  payload = {
                      "host": "katalogai.io",
                      "key": "7f559c9f7d60484fa802ab03c9328995",
                      "keyLocation": "https://katalogai.io/7f559c9f7d60484fa802ab03c9328995.txt",
                      "urlList": urls,
                  }
                  Path('indexnow_payload.json').write_text(json.dumps(payload, ensure_ascii=False), encoding='utf-8')
                  PY

                  curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
                    -H "Content-Type: application/json; charset=utf-8" \
                    --data-binary @indexnow_payload.json || true
                  echo "IndexNow ping complete (post-deploy)"
