name: Ping IndexNow - Mutable Content Update
# РЈРІРµРґРѕРјР»РµРЅРёРµ Search Engines РѕР± РѕР±РЅРѕРІР»РµРЅРёСЏС… РІ РєР°С‚Р°Р»РѕРіРµ

on:
  push:
    branches: [ main ]
    paths:
      - 'catalog/*.json'
      - 'index.json'
      - 'sitemap.xml'

jobs:
  ping-indexnow:
    runs-on: ubuntu-latest
    
    steps:
      - name: рџ“Ґ Checkout repository
        uses: actions/checkout@v4

      - name: рџљЂ Ping IndexNow (Bing)
        run: |
          curl -X POST https://www.bing.com/indexnow \
            -H "Content-Type: application/json" \
            -d '{
              "host": "ilyastas.github.io",
              "key": "${{ secrets.INDEXNOW_KEY }}",
              "keyLocation": "https://ilyastas.github.io/indexnow.txt",
              "urlList": [
                "https://ilyastas.github.io/katalog-ai/",
                "https://ilyastas.github.io/katalog-ai/index.json",
                "https://ilyastas.github.io/katalog-ai/nrdj-salon.json",
                "https://ilyastas.github.io/katalog-ai/secret-skin.json",
                "https://ilyastas.github.io/katalog-ai/mltrade.json",
                "https://ilyastas.github.io/katalog-ai/sitemap.xml"
              ]
            }'
        continue-on-error: true

      - name: рџ”” Ping Google Search Console (via Sitemap)
        run: |
          curl -X POST "https://www.google.com/ping?sitemap=https://ilyastas.github.io/katalog-ai/sitemap.xml"
        continue-on-error: true

      - name: рџ”” Ping Yandex (for Russian indexing)
        run: |
          curl -X POST "https://webmaster.yandex.ru/ping?sitemap=https://ilyastas.github.io/katalog-ai/sitemap.xml"
        continue-on-error: true

      - name: рџ“Љ Notify in Slack (optional)
        if: vars.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "рџљЂ Katalog-AI catalog updated",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Katalog-AI Updated*\nSearch engines have been notified about catalog changes via IndexNow."
                  }
                }
              ]
            }'
        continue-on-error: true

      - name: вњ… IndexNow ping completed
        run: |
          echo "вњ… IndexNow pings sent successfully!"
          echo "рџ”Ќ Catalog will be indexed within 24-48 hours"
