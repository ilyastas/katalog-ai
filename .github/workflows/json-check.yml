name: JSON Lint Check

on:
  push:
    branches:
      - main

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON files in root
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=("*.json")
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JSON files found in repository root."
            exit 0
          fi
          for file in "${files[@]}"; do
            echo "Validating $file"
            python -m json.tool "$file" > /dev/null
          done
