name: Deploy Cloudflare Worker

description: Автоматический деплой Cloudflare Worker при каждом пуше в main.

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install Wrangler
              run: npm install -g wrangler
            - name: Deploy Worker
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
                  CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
              run: |
                  wrangler deploy --account-id $CF_ACCOUNT_ID --api-token $CLOUDFLARE_API_TOKEN
