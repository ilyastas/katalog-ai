name: Deploy Cloudflare Worker

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install Wrangler
              run: npm install -g wrangler
            - name: Deploy Worker
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
              run: wrangler deploy
