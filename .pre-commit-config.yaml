repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-xml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=200"]

  - repo: local
    hooks:
      - id: katalog-sync-sanity
        name: Katalog sync sanity checks
        entry: python scripts/validate_sync.py
        language: system
        pass_filenames: false

      - id: check-utf8
        name: Check UTF-8 encoding (no BOM)
        entry: python scripts/check_utf8.py
        language: system
        pass_filenames: false
