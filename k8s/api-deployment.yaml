apiVersion: apps/v1
kind: Deployment
metadata:
  name: alie-api
  namespace: alie-prod
  labels:
    app: alie-api
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: alie-api
  template:
    metadata:
      labels:
        app: alie-api
        component: backend
    spec:
      containers:
      - name: api
        image: ghcr.io/your-username/alie-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        # From ConfigMap
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: ENVIRONMENT
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: DEBUG
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: LOG_LEVEL
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: POSTGRES_DB
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: REDIS_PORT
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: CORS_ORIGINS
        
        # From Secrets
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: REDIS_PASSWORD
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: CELERY_BROKER_URL
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: CELERY_RESULT_BACKEND
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: OPENAI_API_KEY
        - name: OPENAI_ASSISTANT_ID
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: OPENAI_ASSISTANT_ID
        - name: TWOGIS_API_KEY
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: TWOGIS_API_KEY
        - name: GOOGLE_PLACES_KEY
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: GOOGLE_PLACES_KEY
        - name: APIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: APIFY_TOKEN
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: alie-api-service
  namespace: alie-prod
  labels:
    app: alie-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: alie-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alie-api-hpa
  namespace: alie-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alie-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
