apiVersion: apps/v1
kind: Deployment
metadata:
  name: alie-worker
  namespace: alie-prod
  labels:
    app: alie-worker
    component: celery
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: alie-worker
  template:
    metadata:
      labels:
        app: alie-worker
        component: celery
    spec:
      containers:
      - name: worker
        image: ghcr.io/your-username/alie-worker:latest
        imagePullPolicy: Always
        env:
        # From ConfigMap
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: LOG_LEVEL
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: POSTGRES_DB
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: REDIS_PORT
        
        # From Secrets
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: REDIS_PASSWORD
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: CELERY_BROKER_URL
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: CELERY_RESULT_BACKEND
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: OPENAI_API_KEY
        - name: OPENAI_ASSISTANT_ID
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: OPENAI_ASSISTANT_ID
        - name: TWOGIS_API_KEY
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: TWOGIS_API_KEY
        - name: GOOGLE_PLACES_KEY
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: GOOGLE_PLACES_KEY
        - name: APIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: APIFY_TOKEN
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alie-worker-hpa
  namespace: alie-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alie-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
