apiVersion: v1
kind: ConfigMap
metadata:
  name: alie-config
  namespace: alie-prod
data:
  # Application configuration
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  APP_NAME: "ALIE"
  APP_VERSION: "1.0.0"
  
  # Database configuration
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "alie"
  
  # Redis configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  
  # CORS configuration
  CORS_ORIGINS: "https://alie.kz,https://www.alie.kz"
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_ALLOW_METHODS: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
  CORS_ALLOW_HEADERS: "*"
  
  # Catalog URL
  CATALOG_BASE_URL: "https://alie.kz"
