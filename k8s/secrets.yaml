# IMPORTANT: This is a template file
# DO NOT commit actual secrets to version control
# Use kubectl create secret or external secret management tools

apiVersion: v1
kind: Secret
metadata:
  name: alie-secrets
  namespace: alie-prod
type: Opaque
stringData:
  # Database credentials
  POSTGRES_USER: "alie_user"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis password
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Celery configuration
  CELERY_BROKER_URL: "redis://:CHANGE_ME_IN_PRODUCTION@redis-service:6379/1"
  CELERY_RESULT_BACKEND: "redis://:CHANGE_ME_IN_PRODUCTION@redis-service:6379/2"
  
  # API Keys
  OPENAI_API_KEY: "CHANGE_ME_OPENAI_API_KEY"
  OPENAI_ASSISTANT_ID: "asst_CHANGE_ME"
  TWOGIS_API_KEY: "CHANGE_ME"
  GOOGLE_PLACES_KEY: "CHANGE_ME"
  APIFY_TOKEN: "CHANGE_ME"
  
  # Application secret
  SECRET_KEY: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_HEX_32"

---
# To create secrets from command line:
# kubectl create secret generic alie-secrets \
#   --namespace=alie-prod \
#   --from-literal=POSTGRES_PASSWORD='your_password_here' \
#   --from-literal=REDIS_PASSWORD='your_redis_password' \
#   --from-literal=OPENAI_API_KEY='your_openai_api_key' \
#   --from-literal=OPENAI_ASSISTANT_ID='asst_...' \
#   --from-literal=TWOGIS_API_KEY='your_key' \
#   --from-literal=GOOGLE_PLACES_KEY='your_key' \
#   --from-literal=APIFY_TOKEN='your_token' \
#   --from-literal=SECRET_KEY='your_secret_key'
