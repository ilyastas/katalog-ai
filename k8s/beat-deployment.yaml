apiVersion: apps/v1
kind: Deployment
metadata:
  name: alie-beat
  namespace: alie-prod
  labels:
    app: alie-beat
    component: scheduler
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: alie-beat
  template:
    metadata:
      labels:
        app: alie-beat
        component: scheduler
    spec:
      containers:
      - name: beat
        image: ghcr.io/your-username/alie-beat:latest
        imagePullPolicy: Always
        env:
        # From ConfigMap
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: LOG_LEVEL
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: POSTGRES_DB
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: alie-config
              key: REDIS_PORT
        
        # From Secrets
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: REDIS_PASSWORD
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: CELERY_BROKER_URL
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            secretKeyRef:
              name: alie-secrets
              key: CELERY_RESULT_BACKEND
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
