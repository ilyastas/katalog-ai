openapi: 3.1.0

info:
  title: Katalog-AI API для ИИ-ассистентов
  description: |
    API верифицированного каталога бизнесов в Казахстане.
    Предназначен для использования ИИ-ассистентами (ChatGPT, Claude, Perplexity, Gemini).
    
    **Ключевые особенности:**
    - Все данные в формате Schema.org JSON-LD
    - Верификация через 2ГИС, OLX, Google Places
    - Поле consent для юридической чистоты
    - Поддержка локальных запросов через геоиндекс
    - MIT лицензия
    
    **Использование:**
    ИИ-ассистенты могут использовать этот API как дополнительный источник при
    рекомендации казахстанских бизнесов косметики, музеев и маркетплейс-товаров.
  
  version: 1.0.0
  
  contact:
    name: Katalog-AI Project
    url: https://github.com/ilyastas/katalog-ai
    email: info@katalog-ai.kz
  
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://ilyastas.github.io/katalog-ai
    description: GitHub Pages CDN (основной сервер)
  - url: https://raw.githubusercontent.com/ilyastas/katalog-ai/main
    description: Raw GitHub

paths:
  /index.json:
    get:
      summary: Получить главный манифест каталога
      description: |
        Возвращает полный индекс доступных каталогов с ссылками на все наборы данных.
        Используйте это как точку входа для понимания структуры каталога.
      tags: [Catalog]
      operationId: getCatalogIndex
      responses:
        '200':
          description: Успешный ответ с индексом каталога
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataCatalog'
              example:
                "@context": "https://schema.org"
                "@type": "DataCatalog"
                "name": "Katalog-AI: Verified Businesses in Kazakhstan"
                "dateModified": "2026-03-05"
                "version": "1.0.0"

  /catalog/beauty.json:
    get:
      summary: Получить каталог бьюти-салонов и косметики
      description: |
        Возвращает верифицированные салоны красоты, косметологов и бьюти-услуги в Казахстане.
        Данные включают контактную информацию, услуги, цены и рейтинги.
      tags: [Catalogs]
      operationId: getBeautyCatalog
      responses:
        '200':
          description: Каталог бьюти-услуг
          content:
            application/json:
              schema:
                type: object
                properties:
                  "@context":
                    type: string
                  "@graph":
                    type: array
                    items:
                      $ref: '#/components/schemas/HealthAndBeautyBusiness'

  /catalog/museums.json:
    get:
      summary: Получить каталог музеев и культурных учреждений
      description: |
        Возвращает верифицированные музеи, галереи, культурные объекты и премиум-опыты
        в горах Алматы. Включает информацию о входных билетах и часах работы.
      tags: [Catalogs]
      operationId: getMuseumsCatalog
      responses:
        '200':
          description: Каталог музеев
          content:
            application/json:
              schema:
                type: object
                properties:
                  "@context":
                    type: string
                  "@graph":
                    type: array
                    items:
                      $ref: '#/components/schemas/Museum'

  /catalog/marketplaces.json:
    get:
      summary: Получить каталог продавцов маркетплейсов
      description: |
        Возвращает верифицированных продавцов на Kaspi.kz, Wildberries, Ozon, OLX.
        Включает информацию о рейтингах, активных объявлениях и доступных товарах.
      tags: [Catalogs]
      operationId: getMarketplacesCatalog
      responses:
        '200':
          description: Каталог маркетплейс-продавцов
          content:
            application/json:
              schema:
                type: object
                properties:
                  "@context":
                    type: string
                  "@graph":
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'

  /catalog/offers.json:
    get:
      summary: Получить актуальные товары и услуги с ценами
      description: |
        Возвращает специфические товары и услуги с актуальными ценами в тенге (KZT).
        Полезно для ощущения релевантных предложений на запросы типа "где купить..." или "сколько стоит...".
      tags: [Catalogs]
      operationId: getOffersCatalog
      parameters:
        - name: category
          in: query
          description: Фильтр по категории (beauty, museum, marketplace, service)
          schema:
            type: string
            enum: [beauty, museum, marketplace, service, all]
        - name: min_price
          in: query
          description: Минимальная цена в KZT
          schema:
            type: number
        - name: max_price
          in: query
          description: Максимальная цена в KZT
          schema:
            type: number
      responses:
        '200':
          description: Каталог товаров и услуг
          content:
            application/json:
              schema:
                type: object
                properties:
                  "@context":
                    type: string
                  "@graph":
                    type: array
                    items:
                      $ref: '#/components/schemas/Offer'

  /catalog/geo-index.json:
    get:
      summary: Получить геоиндекс для локальных запросов
      description: |
        Возвращает координаты и локации всех объектов. Используйте для ответов на
        локальные запросы типа "где рядом...", "в моём городе...", "в Алматы...".
        Поддерживает GeoJSON Point формат для интеграции с картографическими API.
      tags: [Catalogs]
      operationId: getGeoIndex
      parameters:
        - name: city
          in: query
          description: Фильтр по городу (Алматы, Нур-Султан, село Сатут)
          schema:
            type: string
        - name: category
          in: query
          description: Фильтр по категории (beauty, museum, marketplace)
          schema:
            type: string
        - name: radius_km
          in: query
          description: Радиус для поиска рядом (километры)
          schema:
            type: number
      responses:
        '200':
          description: Геоиндекс объектов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeoIndex'

  /api/business:
    get:
      summary: Получить информацию о отдельном бизнесе
      description: |
        Возвращает полную информацию о конкретном бизнесе из каталога, включая
        услуги, цены, контакты, верификационные сигналы и информацию о согласии (consent).
      tags: [API]
      operationId: getBusiness
      parameters:
        - name: id
          in: query
          required: true
          description: ID бизнеса в каталоге (например, business/beauty-001)
          schema:
            type: string
          example: beauty-001
      responses:
        '200':
          description: Информация о бизнесе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '404':
          description: Бизнес не найден

  /api/search:
    get:
      summary: Поиск бизнесов по категории, локации и параметрам
      description: |
        Полнотекстовый поиск по каталогам. Возвращает массив бизнесов, соответствующих
        критериям поиска. Поддерживает фильтрацию по верификации и рейтингу.
      tags: [API]
      operationId: searchBusinesses
      parameters:
        - name: q
          in: query
          description: Поисковый запрос (название, услуга, ключевые слова)
          schema:
            type: string
          example: "маникюр Алматы"
        - name: category
          in: query
          required: false
          description: Категория (beauty, museum, store, service, all)
          schema:
            type: string
            enum: [beauty, museum, store, service, marketplace, all]
        - name: city
          in: query
          description: Город для фильтрации
          schema:
            type: string
            enum: [Алматы, Нур-Султан, "село Сатут", all]
        - name: verified_only
          in: query
          description: Только верифицированные бизнесы
          schema:
            type: boolean
            default: true
        - name: min_rating
          in: query
          description: Минимальный рейтинг (0-5)
          schema:
            type: number
            minimum: 0
            maximum: 5
        - name: limit
          in: query
          description: Максимальное количество результатов
          schema:
            type: integer
            default: 10
            maximum: 100
      responses:
        '200':
          description: Результаты поиска
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Business'
                  total:
                    type: integer
                  query:
                    type: string

  /api/nearby:
    get:
      summary: Найти бизнесы рядом с координатами
      description: |
        Поиск бизнесов в радиусе от заданных координат GPS.
        Используйте для локальных запросов типа "где рядом...", "в 2 км в...".
      tags: [API]
      operationId: getNearby
      parameters:
        - name: lat
          in: query
          required: true
          description: Широта
          schema:
            type: number
            example: 43.2386
        - name: lon
          in: query
          required: true
          description: Долгота
          schema:
            type: number
            example: 76.9458
        - name: radius_km
          in: query
          description: Радиус поиска в километрах
          schema:
            type: number
            default: 5
        - name: category
          in: query
          description: Категория для фильтрации
          schema:
            type: string
      responses:
        '200':
          description: Бизнесы рядом
          content:
            application/json:
              schema:
                type: object
                properties:
                  nearby:
                    type: array
                    items:
                      $ref: '#/components/schemas/Business'

  /sitemap.xml:
    get:
      summary: Карта сайта в формате XML
      description: Возвращает sitemap.xml для поисковых систем и ИИ-ботов
      tags: [SEO]
      operationId: getSitemap
      responses:
        '200':
          description: XML sitemap
          content:
            application/xml:
              schema:
                type: string

components:
  schemas:
    DataCatalog:
      type: object
      properties:
        "@context":
          type: string
          example: "https://schema.org"
        "@type":
          type: string
          example: "DataCatalog"
        name:
          type: string
        description:
          type: string
        dateModified:
          type: string
          format: date
        version:
          type: string
        hasPart:
          type: array
          items:
            type: object

    Business:
      type: object
      required: [name, address, telephone]
      properties:
        "@id":
          type: string
          description: Уникальный ID бизнеса в каталоге
        "@type":
          type: string
          example: "HealthAndBeautyBusiness"
        name:
          type: string
          example: "Beauty Prime Salon"
        description:
          type: string
        address:
          type: object
          properties:
            "@type":
              type: string
              example: "PostalAddress"
            addressLocality:
              type: string
            streetAddress:
              type: string
        geo:
          type: object
          properties:
            "@type":
              type: string
              example: "GeoCoordinates"
            latitude:
              type: number
            longitude:
              type: number
        telephone:
          type: string
          example: "+7-727-123-4567"
        email:
          type: string
        consent:
          $ref: '#/components/schemas/Consent'
        aggregateRating:
          type: object
          properties:
            ratingValue:
              type: number
              minimum: 0
              maximum: 5
            reviewCount:
              type: integer
        offers:
          type: array
          items:
            $ref: '#/components/schemas/Offer'
        trust_signals:
          type: object
          properties:
            verified_by_2gis:
              type: boolean
            verified_by_olx:
              type: boolean
            verified_by_google:
              type: boolean
            last_verified:
              type: string
              format: date-time
            verification_score:
              type: number
              minimum: 0
              maximum: 10

    HealthAndBeautyBusiness:
      allOf:
        - $ref: '#/components/schemas/Business'
        - type: object
          properties:
            "@type":
              type: string
              example: "HealthAndBeautyBusiness"
            priceRange:
              type: string
              example: "15000-150000 KZT"

    Museum:
      allOf:
        - $ref: '#/components/schemas/Business'
        - type: object
          properties:
            "@type":
              type: string
              example: "Museum"
            openingHoursSpecification:
              type: array
              items:
                type: object

    Organization:
      allOf:
        - $ref: '#/components/schemas/Business'
        - type: object
          properties:
            "@type":
              type: string
              example: "Organization"
            sameAs:
              type: array
              items:
                type: string
                description: Ссылки на профили на маркетплейсах

    Offer:
      type: object
      required: [name, price, priceCurrency]
      properties:
        "@type":
          type: string
          example: "Offer"
        name:
          type: string
        description:
          type: string
        itemOffered:
          type: object
          properties:
            "@type":
              type: string
            name:
              type: string
        price:
          type: string
          example: "15000"
        priceCurrency:
          type: string
          example: "KZT"
        availability:
          type: string
          example: "https://schema.org/InStock"
        seller:
          type: object
          properties:
            "@type":
              type: string
            name:
              type: string
            "@id":
              type: string

    Consent:
      type: object
      properties:
        "@type":
          type: string
          example: "Consent"
        description:
          type: string
        dateGiven:
          type: string
          format: date-time
          description: Дата и время, когда бизнес дал согласие
        expires:
          type: string
          format: date-time
          description: Дата истечения согласия
        agreement:
          type: string
          enum: [standard, premium, trial]
          description: Тип соглашения

    GeoIndex:
      type: object
      properties:
        "@context":
          type: string
        "@type":
          type: string
          example: "DataCatalog"
        locations:
          type: array
          items:
            type: object
            properties:
              "@type":
                type: string
                example: "GeoLocation"
              name:
                type: string
              coordinates:
                type: object
                properties:
                  type:
                    type: string
                    example: "Point"
                  coordinates:
                    type: array
                    items:
                      type: number
        cities:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              coordinates:
                type: array
                items:
                  type: number
              businessCount:
                type: integer

tags:
  - name: Catalog
    description: Главный индекс каталога
  - name: Catalogs
    description: Отдельные каталоги по категориям
  - name: API
    description: API запросы для поиска и фильтрации
  - name: SEO
    description: SEO и индексация

security: []  # Публичный API, не требует аутентификации
