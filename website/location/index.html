<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locations | Katalog-AI</title>
  <meta name="description" content="Find verified companies by location with structured data." />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Place",
    "name": "Astana",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Astana",
      "addressCountry": "Kazakhstan"
    }
  }
  </script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f8fafc; color: #0f172a; }
    .wrap { max-width: 860px; margin: 0 auto; }
    ul { background: #fff; border-radius: 12px; padding: 18px 22px; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Location: Astana</h1>
    <p>AI-friendly location page with verified business listings.</p>
    <ul>
      <li><a href="../company/">Astana Legal Group</a> - Legal Services</li>
      <li>Tech Startup Hub - Business Services</li>
    </ul>
  </div>
</body>
</html>
